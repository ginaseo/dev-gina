<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>서진하 · Resume</title>
<link rel="stylesheet" href="/dev-gina/style.css" />
</head>
<body>

<div id="progress-track">
  <div id="progress-fill"></div>
</div>

<div id="page-shell">

  <div id="top-controls">
    <div class="pillgroup">
      <a class="nav-link-btn" href="/dev-gina/timeline/" data-i18n="nav.timeline"></a>
    </div>
    <div class="pillgroup">
      <button type="button" class="icon-btn" id="theme-toggle" aria-label="다크모드 전환" title="다크모드 전환">🌙</button>
      <button type="button" class="icon-btn" id="print-btn" aria-label="인쇄" title="인쇄">🖨️</button>
    </div>
    <div class="pillgroup">
      <button type="button" class="text-btn" id="lang-ko" aria-pressed="true">한국어</button>
      <button type="button" class="text-btn" id="lang-en" aria-pressed="false">English</button>
    </div>
  </div>

  <nav id="side-nav"></nav>

  <div class="wrap">
    <header id="about">
      <div class="hero-center">
        <div class="hero-row">
          <div class="avatar" data-i18n="header.avatar"></div>
          <div>
            <div class="name" data-i18n="header.name"></div>
            <div class="role" data-i18n="header.tagline"></div>
            <div class="contact">
              <a href="mailto:iamginaseo@gmail.com">iamginaseo@gmail.com</a> ·
              <a href="https://github.com/ginaseo">github.com/ginaseo</a>
            </div>
          </div>
        </div>
      </div>
      <p class="pitch" data-i18n="header.pitch"></p>
    </header>

    <section id="skills">
      <div class="section-head"><span class="section-num">1</span><h2 data-i18n="side.skills"></h2></div>
      <div class="section-body">
        <ul>
          <li data-i18n="skills.li1"></li>
          <li data-i18n="skills.li2"></li>
          <li data-i18n="skills.li3"></li>
          <li data-i18n="skills.li4"></li>
        </ul>
      </div>
    </section>

    <section id="stack">
      <div class="section-head"><span class="section-num">2</span><h2 data-i18n="side.stack"></h2></div>
      <div class="section-body">
        <ul class="plain">
          <li data-i18n="stack.li1"></li>
          <li data-i18n="stack.li2"></li>
          <li data-i18n="stack.li3"></li>
          <li data-i18n="stack.li4"></li>
          <li data-i18n="stack.li5"></li>
          <li data-i18n="stack.li6"></li>
          <li data-i18n="stack.li7"></li>
          <li data-i18n="stack.li8"></li>
        </ul>
      </div>
    </section>

    <section id="projects">
      <div class="section-head"><span class="section-num">3</span><h2 data-i18n="side.projects"></h2><span class="section-period" data-i18n="projects.period"></span></div>
      <div class="section-body">
        <div class="entry">
          <h3 data-i18n="projects.p1.title"></h3>
          <div class="meta" data-i18n="projects.p1.meta"></div>
          <div class="proj-headline" data-i18n="projects.p1.headline"></div>
          <ul>
            <li data-i18n="projects.p1.li1"></li>
            <li data-i18n="projects.p1.li2"></li>
            <li data-i18n="projects.p1.li3"></li>
            <li data-i18n="projects.p1.li4"></li>
          </ul>
          <div class="tech" data-i18n="projects.p1.tech"></div>
        </div>

        <div class="entry">
          <h3 data-i18n="projects.p2.title"></h3>
          <div class="meta" data-i18n="projects.p2.meta"></div>
          <div class="proj-headline" data-i18n="projects.p2.headline"></div>
          <ul>
            <li data-i18n="projects.p2.li1"></li>
            <li data-i18n="projects.p2.li2"></li>
            <li data-i18n="projects.p2.li3"></li>
          </ul>
          <div class="tech" data-i18n="projects.p2.tech"></div>
        </div>
      </div>
    </section>

    <section id="careers">
      <div class="section-head"><span class="section-num">4</span><h2 data-i18n="side.careers"></h2><span class="section-period" data-i18n="careers.period"></span></div>
      <div class="section-body">
        <div class="entry">
          <h3 data-i18n="careers.c1.title"></h3>
          <div class="meta" data-i18n="careers.c1.meta"></div>
          <ul>
            <li data-i18n="careers.c1.li1"></li>
            <li data-i18n="careers.c1.li2"></li>
            <li data-i18n="careers.c1.li3"></li>
            <li data-i18n="careers.c1.li4"></li>
          </ul>
          <div class="tech" data-i18n="careers.c1.tech"></div>
        </div>
        <p class="oss-note" data-i18n="careers.oss"></p>
      </div>
    </section>

    <section id="education">
      <div class="section-head"><span class="section-num">5</span><h2 data-i18n="side.education"></h2></div>
      <div class="section-body">
        <ul class="plain">
          <li data-i18n="education.e1"></li>
          <li data-i18n="education.e2"></li>
          <li data-i18n="education.e3"></li>
          <li data-i18n="education.e4"></li>
        </ul>
      </div>
    </section>

    <section id="etc">
      <div class="section-head"><span class="section-num">6</span><h2 data-i18n="side.etc"></h2><span class="section-period" data-i18n="etc.period"></span></div>
      <div class="section-body">
        <p data-i18n="etc.p"></p>
        <ul>
          <li data-i18n="etc.li1"></li>
          <li data-i18n="etc.li2"></li>
          <li data-i18n="etc.li3"></li>
        </ul>
      </div>
    </section>
  </div>

  <div id="bottom-spacer"></div>
</div>

<script src="/dev-gina/i18n.js"></script>
<script src="/dev-gina/app.js"></script>
</body>
</html>
