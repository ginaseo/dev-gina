  .pitch { font-size: 13.5px; line-height: 1.8; margin-top: 22px; max-width: 56ch; }
  .pitch strong { color: var(--accent); font-weight: 700; }

  section { margin-top: 88px; scroll-margin-top: 90px; }
  .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .section-num {
    width: 30px; height: 30px; border-radius: 9px; color: #fff; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800;
  }
  h2 {
    font-size: 22px; font-weight: 800; letter-spacing: -0.01em; color: var(--ink); margin: 0;
  }
  h3 { font-size: 14px; font-weight: 700; margin: 0; }
  .meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .entry { margin-top: 22px; }
  .entry:first-child { margin-top: 0; }
  ul { font-size: 13px; line-height: 1.8; margin: 10px 0 0; padding-left: 18px; color: var(--ink); }
  ul.plain { padding-left: 0; list-style: none; margin-top: 0; }
  li + li { margin-top: 4px; }
  .tech { font-size: 11.5px; color: var(--sub); margin-top: 8px; }
  .tech b { color: var(--sub); font-weight: 700; }
  p { font-size: 13px; line-height: 1.8; margin: 0; }

  #top-controls {
    position: fixed; top: 16px; right: 20px; z-index: 60; display: flex; gap: 8px; align-items: center;
  }
  .pillgroup {
    display: flex; gap: 2px; background: var(--chip-track-bg); border-radius: 9px; padding: 2px;
  }
  .pillgroup button {
    border: none; padding: 6px 10px; border-radius: 7px; font-size: 12px; cursor: pointer;
    background: transparent; line-height: 1; font-family: inherit; color: var(--sub); font-weight: 700;

  .pillgroup button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .pillgroup a {
    padding: 6px 10px; border-radius: 7px; font-size: 12px; font-weight: 700; color: var(--sub);
    text-decoration: none; display: inline-block; line-height: 1;
  }
  .pillgroup a::after { content: none; }

  #side-nav {
    position: fixed; top: 50%; right: 20px; transform: translateY(-50%); z-index: 55;
    display: flex; flex-direction: column; gap: 10px;
  }

    text-align: left; display: flex; align-items: center; gap: 6px; white-space: nowrap;
    padding: 5px 11px; border-radius: 14px; cursor: pointer; font-family: inherit;
    border: 1px solid var(--line); box-shadow: 0 1px 4px rgba(0,0,0,.06);

  #side-nav button.active {

  #side-nav button.active .section-dot { background: #fff; }
  #side-nav button:hover:not(.active) { color: var(--accent); }

    section { break-inside: avoid; }

</style>

  var NAV_ORDER = [
    { id: 'about', color: 'var(--sky)' },
    { id: 'skills', color: 'var(--blue)', num: 1 },
    { id: 'stack', color: 'var(--green)', num: 2 },
    { id: 'projects', color: 'var(--purple)', num: 3 },
    { id: 'careers', color: 'var(--red)', num: 4 },
    { id: 'education', color: 'var(--gold)', num: 5 },
    { id: 'etc', color: 'var(--orange)', num: 6 },
  ];
  var sideNav = document.getElementById('side-nav');
  NAV_ORDER.forEach(function (entry) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.dataset.target = entry.id;
    btn.dataset.i18nNav = 'side.' + entry.id;
    btn.style.setProperty('--dot-color', entry.color);
    if (entry.num) {
      var num = document.createElement('span');
      num.className = 'nav-num';
      num.textContent = entry.num;
      btn.appendChild(num);
    } else {
      var dot = document.createElement('span');
      dot.className = 'section-dot';
      dot.style.background = entry.color;
      btn.appendChild(dot);
    }
    var label = document.createElement('span');
    label.className = 'nav-label';
    btn.appendChild(label);
    btn.addEventListener('click', function () {
      document.getElementById(entry.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    sideNav.appendChild(btn);
  });

  var currentLang = 'ko';
  function applyLang(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      el.innerHTML = I18N[lang][key] || '';
    });
    sideNav.querySelectorAll('button').forEach(function (btn) {
      var key = btn.getAttribute('data-i18n-nav');
      btn.querySelector('.nav-label').textContent = I18N[lang][key] || '';
    });
    document.getElementById('lang-ko').setAttribute('aria-pressed', String(lang === 'ko'));
    document.getElementById('lang-en').setAttribute('aria-pressed', String(lang === 'en'));
    document.documentElement.lang = lang;
  }
  document.getElementById('lang-ko').addEventListener('click', function () { applyLang('ko'); });
  document.getElementById('lang-en').addEventListener('click', function () { applyLang('en'); });
  applyLang('ko');

  var root = document.documentElement;
  function systemDark() { return window.matchMedia('(prefers-color-scheme: dark)').matches; }
  document.getElementById('theme-toggle').addEventListener('click', function () {
    var current = root.getAttribute('data-theme');
    var isDark = current ? current === 'dark' : systemDark();
    root.setAttribute('data-theme', isDark ? 'light' : 'dark');
  });
  document.getElementById('print-btn').addEventListener('click', function () {
    window.print();
  });

  var sections = NAV_ORDER.map(function (entry) { return document.getElementById(entry.id); });
  var navButtons = Array.prototype.slice.call(sideNav.querySelectorAll('button'));

  function updateActiveSection() {
    var idx = -1;
    sections.forEach(function (s, i) {
      if (s.getBoundingClientRect().top < 160) idx = i;
    });
    var doc = document.documentElement;
    var maxScroll = doc.scrollHeight - window.innerHeight;
    if (maxScroll > 0 && window.scrollY >= maxScroll - 4) idx = sections.length - 1;
    navButtons.forEach(function (b, i) { b.classList.toggle('active', i === idx); });
  }

  var ticking = false;
  window.addEventListener('scroll', function () {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(function () { ticking = false; updateActiveSection(); });
  }, { passive: true });
  window.addEventListener('resize', updateActiveSection, { passive: true });
  updateActiveSection();
})();
</script>
