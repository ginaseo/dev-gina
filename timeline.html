<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>서진하 · Life Timeline</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css">
<style>
:root{--ink:oklch(20% 0.01 80);--sub:oklch(45% 0.01 80);--line:oklch(90% 0.005 80);--card-w:235px;--card-maxw:235px}
*{box-sizing:border-box}
body{margin:0;background:oklch(98% 0.005 80);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif}
a{color:oklch(50% 0.14 275)}
a:hover{color:oklch(42% 0.14 275)}
button{font-family:inherit}
input{font-family:inherit}
.card{transition:box-shadow .2s ease,transform .2s ease}
.card:hover{box-shadow:0 8px 20px rgba(0,0,0,.09);transform:scale(1.02)}
#chip-row{scrollbar-width:none}
#chip-row::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<div id="progress-track" style="position:fixed;top:0;left:0;right:0;height:3px;background:oklch(92% 0.005 80);z-index:60">
<div id="progress-fill" style="height:100%;background:oklch(30% 0.02 80);width:0%;transition:width .1s linear"></div>
</div>

<div style="position:fixed;top:12px;right:16px;z-index:60;display:flex;gap:2px;background:oklch(94% 0.005 80);border-radius:9px;padding:2px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
<button type="button" id="lang-ko" style="border:none;padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">한국어</button>
<button type="button" id="lang-en" style="border:none;padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">EN</button>
</div>

<div id="nav-rail" style="position:fixed;top:50%;right:18px;transform:translateY(-50%);z-index:55;display:flex;flex-direction:column;gap:11px"></div>

<div style="position:relative;background:oklch(98% 0.005 80);min-height:100vh">

<div id="hero" style="max-width:900px;margin:0 auto;display:flex;align-items:center;gap:22px"></div>

<div style="position:sticky;top:3px;z-index:40;background:oklch(98% 0.005 80 / 0.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 0">
<div id="search-wrap" style="max-width:900px;margin:0 auto;padding:0 24px 8px;text-align:center">
<input type="text" id="search-input" aria-label="타임라인 검색" style="width:100%;max-width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12.5px;background:#fff;color:var(--ink)">
</div>
<div id="chip-row" style="max-width:900px;margin:0 auto;padding:0 24px 8px;display:flex;justify-content:center;gap:7px;overflow-x:auto"></div>
<div id="mode-toggles" style="max-width:900px;margin:0 auto;padding:2px 24px 0;display:flex;flex-wrap:wrap;justify-content:center;gap:16px;align-items:center"></div>
</div>

<div id="main-content"></div>

<div style="max-width:900px;margin:0 auto;padding:0 24px;min-height:52vh"></div>

</div>

<script>
const BLUE='oklch(58% 0.15 250)',GREEN='oklch(56% 0.13 150)',ORANGE='oklch(68% 0.15 55)',SKY='oklch(68% 0.10 220)',
      RED='oklch(58% 0.17 25)',GRAY='oklch(62% 0.01 80)',GOLD='oklch(63% 0.15 80)',INK='oklch(20% 0.01 80)',
      FILLED_LINE='oklch(30% 0.02 80)',UNFILLED_LINE='oklch(88% 0.005 80)',PURPLE='oklch(55% 0.15 300)';
const TRAVEL_CAT='여행',FIT_CAT='운동',CAD_CAT='설계',IT_CAT='개발';

const CATEGORIES=[
  {name:IT_CAT,color:PURPLE,icon:'💻'},
  {name:CAD_CAT,color:GREEN,icon:'📐'},
  {name:'교육',color:BLUE,icon:'🎓'},
  {name:TRAVEL_CAT,color:ORANGE,icon:'🧳'},
  {name:FIT_CAT,color:RED,icon:'🏋️'}
];

const TR_CATEGORIES={'전체':'All','교육':'Education','설계':'Design','개발':'IT','여행':'Travel','운동':'Fitness','전환':'Transition'};

const TR_CHAPTERS={
  '06':{title:'Restart',theme:'Back to being a developer',short:'Restart'},
  '05':{title:'Reset',theme:'Not a pause, but growth in a different way',short:'Reset'},
  '04':{title:'Backend Developer',theme:'A new language, a new career',short:'Backend'},
  '03':{title:'CAD Design',theme:'Building expertise as a designer',short:'Design'},
  '02':{title:'Living Abroad',theme:'Independence learned in unfamiliar places',short:'Abroad'},
  '01':{title:'Student Years',theme:'Laying the foundation',short:'Student'}
};

const TR_NODES={
  r1:{title:'Programmers Devcourse (Advanced)',sub:'Spring AI · Backend development with MSA'},
  r2:{title:'Life as a CrossFitter',sub:'Consistency built through CrossFit'},
  r3:{title:'Life as a Surfer',sub:'Immersed in surfing between Yangyang and Bali'},
  r4:{title:'Recharging Through Travel',sub:'Zhangjiajie · Jeonnam · Sokcho · Miyazaki'},
  r5:{title:'RealInvention · Java Backend Developer',sub:'Public-sector SI backend development & operations'},
  r6:{title:'Korea National Open University',sub:'Computer Science'},
  r7:{title:'Java Application SW Developer Training',sub:'Full-stack web development training in Java'},
  r8:{title:'Yushin · CAD Designer',sub:'AutoCAD, Illustrator'},
  r9:{title:'Short Trip',sub:'West Coast US trip'},
  r10:{title:'Misung Engineering · CAD Designer',sub:'AutoCAD'},
  r11:{title:'SNK Patent Law Firm · CAD Designer',sub:'AutoCAD, Photoshop'},
  r12:{title:'CATIA Mechanical Design Course',sub:'CATIA Mechanical Design I·II'},
  r13:{title:'Interior Architecture Drafting',sub:'AutoCAD'},
  r14:{title:'CATIA Aircraft Structure Design Course',sub:'CATIA Aircraft Structure Design I·II'},
  r15:{title:'Interior Design Specialist Course',sub:'AutoCAD · BIM · SketchUp · 3ds Max'},
  r16:{title:'Canada Working Holiday',sub:'Language study · cultural experience'},
  r17:{title:'Short Overseas Trip',sub:'Singapore · Indonesia · India · 7 European countries, cultural experience'},
  r18:{title:'Myongji College',sub:'Information & Communications (3-year program), graduated'},
  r19:{title:'Dowon Ubitech Internship',sub:'Supported public-sector web service development'}

const RAW_CHAPTERS=[
  {num:'06',title:'재시작',period:'2026',theme:'다시, 개발자로',accent:'oklch(50% 0.14 275)',shortTitle:'재시작',
    blocks:[
      {kind:'node',label:'2026',node:{id:'r1',category:'교육',altCategory:IT_CAT,color:BLUE,icon:'🤖',title:'프로그래머스 데브코스 심화',sub:'Spring AI · MSA를 활용한 백엔드 개발',period:'2026.03 – 05',milestone:'개발 복귀',alias:'ai spring ai devcourse java',tags:['BookCommerce','DevTicket']}}
    ]},
  {num:'05',title:'리셋',period:'2023 – 2026.02',theme:'멈춘 게 아니라, 다르게 성장한 시간',accent:SKY,shortTitle:'리셋',
    blocks:[
      {kind:'node',label:'2024',node:{id:'r2',category:FIT_CAT,color:RED,icon:'🏋️',title:'크로스핏터로 살아보기',sub:'크로스핏으로 다진 꾸준함',period:'2024.08 – 2026.02',alias:'crossfit'}},
      {kind:'node',label:'2023',node:{id:'r3',category:FIT_CAT,color:RED,icon:'🏄',title:'서퍼로 살아보기',sub:'양양 · 발리를 오가며 서핑에 몰입',period:'2023.10 – 2024.06',alias:'bali surfing yangyang'}},
      {kind:'node',label:'2023',node:{id:'r4',category:TRAVEL_CAT,color:ORANGE,icon:'🧳',title:'여행으로 재충전',sub:'장가계 · 전남 · 속초 · 미야자키',period:'2023.10 – 2024.07',alias:'miyazaki'}}
    ]},
  {num:'04',title:'백엔드 개발자',period:'2020 – 2024.02',theme:'새 언어로 다시 쓴 커리어',accent:'oklch(55% 0.15 300)',shortTitle:'백엔드',
    blocks:[
      {kind:'overlap',label:'2021',periodLabel:'2021.08 – 2024.02',
        laneLLabel:IT_CAT,laneLIcon:'💻',laneLColor:PURPLE,laneLCategory:IT_CAT,
        laneL:[{id:'r5',icon:'💼',title:'리얼인벤션 · 자바 백엔드 개발자',sub:'공공 SI 백엔드 개발 및 운영 경험',period:'2022.05 – 2023.09',milestone:'첫 개발회사'}],
        laneRLabel:'교육',laneRIcon:'🎓',laneRColor:BLUE,laneRCategory:'교육',
        laneR:[{id:'r6',icon:'🎓',title:'한국방송통신대학교',sub:'컴퓨터과학과',period:'2021.08 – 2024.02',altCategory:IT_CAT}]},
      {kind:'node',label:'2020',node:{id:'r7',category:'교육',altCategory:IT_CAT,color:BLUE,icon:'📘',title:'Java 응용SW개발자 양성',sub:'Java 기반 풀스택 웹 개발 교육',period:'2020.10 – 2021.03',milestone:'개발자 전향'}}
    ]},
  {num:'03',title:'CAD 설계',period:'2014 – 2020',theme:'설계자로서 전문성을 쌓다',accent:GREEN,shortTitle:'설계',
    blocks:[
      {kind:'node',label:'2018',node:{id:'r8',category:CAD_CAT,color:GREEN,icon:'💼',title:'유신 · 캐드원',sub:'AutoCAD, Illustrator',period:'2018.08 – 2020.08',alias:'cad 캐드 오토캐드 autocad'}},
      {kind:'node',label:'2018',node:{id:'r9',category:TRAVEL_CAT,color:ORANGE,icon:'🧳',title:'단기 해외여행',sub:'미국 서부 여행',period:'2018.04 – 07'}},
      {kind:'overlap',label:'2015',periodLabel:'2015.03 – 2018.04',
        laneLLabel:CAD_CAT,laneLIcon:'📐',laneLColor:GREEN,laneLCategory:CAD_CAT,
        laneL:[
          {id:'r11',icon:'💼',title:'SNK특허법률사무소 · 캐드원',sub:'AutoCAD, Photoshop',period:'2015.03 – 2018.04',milestone:'첫 직장',alias:'cad 캐드 오토캐드 autocad'},
          {id:'r10',icon:'💼',title:'미승엔지니어링 · 캐드원',sub:'AutoCAD',period:'2017.09 – 10'}
        ],
        laneRLabel:'교육',laneRIcon:'🎓',laneRColor:BLUE,laneRCategory:'교육',
        laneR:[
          {id:'r12',icon:'🎓',title:'CATIA 기계설계 과정',sub:'CATIA 기계설계 Ⅰ·Ⅱ',period:'2015.12 – 2016.05',altCategory:CAD_CAT,alias:'카티아'},
          {id:'r13',icon:'🎓',title:'실내건축설계도서작성',sub:'AutoCAD',period:'2016.12 – 2017.02',altCategory:CAD_CAT,alias:'오토캐드 캐드 cad'},
          {id:'r14',icon:'🎓',title:'CATIA 항공기구설계 과정',sub:'CATIA 항공기구설계 Ⅰ·Ⅱ',period:'2017.02 – 05',altCategory:CAD_CAT,alias:'카티아'}
        ]},
      {kind:'node',label:'2014',node:{id:'r15',category:'교육',altCategory:CAD_CAT,color:BLUE,icon:'🎓',title:'인테리어 전문가 과정',sub:'AutoCAD · BIM · SketchUp · 3ds Max',period:'2014.10 – 2015.02',alias:'캐드 오토캐드 autocad'}}
    ]},
  {num:'02',title:'해외 경험',period:'2011 – 2014',theme:'낯선 환경에서 배운 독립심',accent:ORANGE,shortTitle:'해외',
    blocks:[
      {kind:'node',label:'2012',node:{id:'r16',category:TRAVEL_CAT,color:ORANGE,icon:'✈️',title:'캐나다 워킹홀리데이',sub:'어학연수 · 문화 경험',period:'2012.12 – 2014.08',alias:'canada'}},
      {kind:'node',label:'2011',node:{id:'r17',category:TRAVEL_CAT,color:ORANGE,icon:'🧳',title:'단기 해외여행',sub:'싱가포르 · 인도네시아 · 인도 · 유럽 7개국 문화 경험',period:'2011.02 – 10',milestone:'첫 해외'}}
    ]},
  {num:'01',title:'학생 시절',period:'2009 – 2013',theme:'기초를 다진 시간',accent:BLUE,shortTitle:'학생',
    blocks:[
      {kind:'overlap',label:'2009',periodLabel:'2009.03 – 2013.02',
        laneLLabel:IT_CAT,laneLIcon:'💼',laneLColor:PURPLE,laneLCategory:IT_CAT,
        laneL:[{id:'r19',icon:'💼',title:'도원유비텍 인턴',sub:'공공기관 웹 서비스 개발 지원',period:'2012.07 – 08'}],
        laneRLabel:'교육',laneRIcon:'🎓',laneRColor:BLUE,laneRCategory:'교육',
        laneR:[{id:'r18',icon:'🎓',title:'명지전문대',sub:'정보통신과 졸업 (3년제)',period:'2009.03 – 2013.02',altCategory:IT_CAT}]}
    ]}
];

// ---------- state ----------
const state={
  progress:0, activeIdx:-1, revealed:new Set(),
  isMobile: window.innerWidth<720,
  showRail: window.innerWidth>=1060,
  activeCategory:'전체', viewMode:'timeline', displayMode:'detailed',
  searchQuery:'', language:'ko'
};

const esc=(s)=>String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function nodeMatchesFilter(node,category){return category==='전체'||node.category===category||node.altCategory===category;}
function nodeMatchesSearch(node,q){
  if(!q) return true;
  const hay=[node.title,node.sub,node.category,node.alias].filter(Boolean).join(' ').toLowerCase();
  return hay.includes(q);
}
function reveal(id){const r=id?state.revealed.has(id):true;return {opacity:r?1:0,y:r?0:14};}

function tCat(name){return state.language==='en'?(TR_CATEGORIES[name]||name):name;}
function tNode(raw){
  const tr=TR_NODES[raw.id];
  if(state.language==='en'&&tr) return {...raw,title:tr.title,sub:tr.sub,category:tCat(raw.category)};
  return {...raw,category:tCat(raw.category)};
}
function decorate(raw){
  const n=tNode(raw);
  const rv=reveal(n.id);
  return {...n,revealOpacity:rv.opacity,revealY:rv.y,
    showSub:state.displayMode==='detailed'&&!!n.sub,
    borderColor:n.milestone?GOLD:'var(--line)',
    dotColor:n.milestone?GOLD:n.color,
    dotSize:n.milestone?12:8};
}

function cardHTML(n,{tags}={tags:false}){
  return `<div class="card" data-reveal="${n.id}" style="opacity:${n.revealOpacity};transform:translateY(${n.revealY}px);transition:opacity .5s ease,transform .5s ease;background:#fff;border:1px solid ${n.borderColor};border-radius:9px;padding:7px 11px;width:var(--card-w,235px);max-width:var(--card-maxw,235px);box-sizing:border-box;display:flex;flex-direction:column;gap:1px">
    <div style="display:flex;align-items:center;gap:5px"><span style="font-size:11px">${n.icon}</span><span style="font-size:9px;font-weight:700;color:${n.color}">${esc(n.category)}</span><span style="margin-left:auto;font-size:9.5px;color:var(--sub);font-variant-numeric:tabular-nums">${esc(n.period)}</span></div>
    <div style="font-size:12px;font-weight:700;color:var(--ink);line-height:1.3">${n.milestone?'⭐ ':''}${esc(n.title)}</div>
    ${n.showSub?`<div style="font-size:10px;color:var(--sub)">${esc(n.sub)}</div>`:''}
    ${tags&&n.tags?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:3px">${n.tags.map(t=>`<span style="font-size:9px;color:var(--sub);background:oklch(96% 0.01 80);padding:1px 6px;border-radius:5px">${esc(t)}</span>`).join('')}</div>`:''}
  </div>`;
}
function laneCardHTML(n,laneColor,laneLabel){
  return `<div class="card" data-reveal="${n.id}" style="opacity:${n.revealOpacity};transform:translateY(${n.revealY}px);transition:opacity .5s ease,transform .5s ease;background:#fff;border:1px solid ${n.borderColor};border-radius:9px;padding:7px 10px;display:flex;flex-direction:column;gap:1px;width:var(--card-w,235px);max-width:var(--card-maxw,235px);box-sizing:border-box">
    <div style="display:flex;align-items:center;gap:5px"><span style="font-size:11px">${n.icon}</span><span style="font-size:9px;font-weight:700;color:${laneColor}">${esc(laneLabel)}</span><span style="margin-left:auto;font-size:9.5px;color:var(--sub);font-variant-numeric:tabular-nums">${esc(n.period)}</span></div>
    <div style="font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.3">${n.milestone?'⭐ ':''}${esc(n.title)}</div>
    ${n.showSub?`<div style="font-size:9.5px;color:var(--sub)">${esc(n.sub)}</div>`:''}
  </div>`;
}

function buildChapters(){
  const q=state.searchQuery.trim().toLowerCase();
  let sideCounter=0;
  return RAW_CHAPTERS.map((c,ci)=>{
    const filled=ci<=state.activeIdx;
    const lineColor=filled?FILLED_LINE:UNFILLED_LINE;
    const groups=[];
    let lastLabel=null, spineGroup=null;

    c.blocks.forEach((b)=>{
      if(b.kind==='node'){
        const n=b.node;
        if(!nodeMatchesFilter(n,state.activeCategory)||!nodeMatchesSearch(n,q)) return;
        if(b.label!==lastLabel||!spineGroup){
          spineGroup={isSpine:true,isOverlap:false,label:b.label,marginTop:groups.length===0?2:24,rows:[]};
          groups.push(spineGroup); lastLabel=b.label;
        }
        const side=state.isMobile?'right':(sideCounter%2===0?'left':'right');
        sideCounter++;
        const dn=decorate(n);
        spineGroup.rows.push({...dn,showLeft:side==='left',showRight:side==='right'});
      } else if(b.kind==='overlap'){
        const laneLVisible=b.laneL.filter((n)=>nodeMatchesFilter({...n,category:b.laneLCategory},state.activeCategory)&&nodeMatchesSearch(n,q));
        const laneRVisible=b.laneR.filter((n)=>nodeMatchesFilter({...n,category:b.laneRCategory},state.activeCategory)&&nodeMatchesSearch(n,q));
        if(laneLVisible.length===0&&laneRVisible.length===0) return;
        const laneLNodes=laneLVisible.map(decorate);
        const laneRNodes=laneRVisible.map(decorate);
        const maxLen=Math.max(laneLNodes.length,laneRNodes.length);
        const rows=[];
        for(let i=0;i<maxLen;i++){
          const l=laneLNodes[i]||null, r=laneRNodes[i]||null;
          const dc=(l&&r)?lineColor:(l?b.laneLColor:b.laneRColor);
          rows.push({rowNum:i+1,l,r,dotColor:dc,dotSize:((l&&l.milestone)||(r&&r.milestone))?12:8});
        }
        groups.push({isSpine:false,isOverlap:true,label:b.label,marginTop:groups.length===0?2:24,rows,
          laneLLabel:tCat(b.laneLLabel),laneLColor:b.laneLColor,laneRLabel:tCat(b.laneRLabel),laneRColor:b.laneRColor});
        lastLabel=null; spineGroup=null;
      }
    });

    const trC=TR_CHAPTERS[c.num];
    const isEn=state.language==='en';
    return {idx:ci,num:c.num,title:isEn&&trC?trC.title:c.title,period:c.period,
      theme:isEn&&trC?trC.theme:c.theme,accent:c.accent,lineColor,hasVisible:groups.length>0,groups};
  });
}

function flatNodes(){
  const out=[];
  RAW_CHAPTERS.forEach((c)=>c.blocks.forEach((b)=>{
    if(b.kind==='node') out.push({...b.node,year:parseInt(b.node.period,10)});
    else{
      b.laneL.forEach((n)=>out.push({...n,category:b.laneLCategory,year:parseInt(n.period,10)}));
      b.laneR.forEach((n)=>out.push({...n,category:b.laneRCategory,year:parseInt(n.period,10)}));
    }
  }));
  return out;
}

function gridCardHTML(n){
  return `<div class="card" data-reveal="${n.id}" style="opacity:${n.revealOpacity};transform:translateY(${n.revealY}px);transition:opacity .5s ease,transform .5s ease;background:#fff;border:1px solid ${n.borderColor};border-radius:10px;padding:9px 13px">
    <div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px">${n.icon}</span>${n.category?`<span style="font-size:9px;font-weight:700;color:${n.color||GRAY}">${esc(n.category)}</span>`:''}<span style="margin-left:auto;font-size:10px;color:var(--sub)">${esc(n.period)}</span></div>
    <div style="font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.3;margin-top:2px">${n.milestone?'⭐ ':''}${esc(n.title)}</div>
    ${n.showSub?`<div style="font-size:10px;color:var(--sub);margin-top:2px">${esc(n.sub)}</div>`:''}
  </div>`;
}

// ---------- render ----------
function renderHero(){
  const isEn=state.language==='en';
  const isMobile=state.isMobile;
  document.getElementById('hero').style.padding=`${isMobile?32:44}px ${isMobile?20:24}px 20px`;
  const photoSize=isMobile?56:68;
  const initial=isEn?'J':'서';
  document.getElementById('hero').innerHTML=`
    <div style="width:${photoSize}px;height:${photoSize}px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid var(--line);background:linear-gradient(135deg,${BLUE},${PURPLE});display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:${photoSize*0.4}px">${initial}</div>
    <div>
      <div style="font-size:${isMobile?26:32}px;font-weight:800;color:var(--ink);letter-spacing:-0.02em;line-height:1.05">${isEn?'Jinha (Gina) Seo':'서진하'}</div>
      <div style="font-size:${isMobile?14:15.5}px;font-weight:600;color:var(--sub);margin-top:6px">${isEn?'Backend Developer Growing with AI':'AI와 함께 성장하는 백엔드 개발자'}</div>
      <div style="font-size:12.5px;color:var(--sub);margin-top:8px;font-variant-numeric:tabular-nums;letter-spacing:.03em">${isEn?'2009 – Present':'2009 ~ 현재'}</div>
    </div>`;
}

function renderLangToggle(){
  const isEn=state.language==='en';
  const ko=document.getElementById('lang-ko'), en=document.getElementById('lang-en');
  ko.style.background=!isEn?'#fff':'transparent'; ko.style.color=!isEn?'var(--ink)':'var(--sub)'; ko.setAttribute('aria-pressed',String(!isEn));
  en.style.background=isEn?'#fff':'transparent'; en.style.color=isEn?'var(--ink)':'var(--sub)'; en.setAttribute('aria-pressed',String(isEn));
}

function renderChipRow(){
  const chips=[{name:'전체',icon:'⭐',color:INK},...CATEGORIES];
  document.getElementById('chip-row').innerHTML=chips.map((cat)=>{
    const active=state.activeCategory===cat.name;
    return `<button type="button" data-cat="${esc(cat.name)}" aria-pressed="${active}" style="flex-shrink:0;white-space:nowrap;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1px solid ${active?cat.color:'var(--line)'};background:${active?cat.color:'#fff'};color:${active?'#fff':'var(--ink)'};font-size:12px;font-weight:600;cursor:pointer">
      <span style="width:7px;height:7px;border-radius:50%;background:${cat.color}"></span>${cat.icon} ${esc(tCat(cat.name))}
    </button>`;
  }).join('');
  document.getElementById('chip-row').querySelectorAll('button').forEach((btn)=>{
    btn.addEventListener('click',()=>setCategory(btn.getAttribute('data-cat')));
  });
}

function renderModeToggles(){
  const isEn=state.language==='en';
  const viewOpts=isEn?[{key:'timeline',label:'Timeline'},{key:'category',label:'Category'},{key:'year',label:'Year'}]
    :[{key:'timeline',label:'타임라인'},{key:'category',label:'카테고리'},{key:'year',label:'연도'}];
  const dispOpts=isEn?[{key:'compact',label:'Compact'},{key:'detailed',label:'Detailed'}]
    :[{key:'compact',label:'간략히'},{key:'detailed',label:'자세히'}];
  const toggleHTML=(opts,activeKey,handlerName)=>opts.map((o)=>{
    const active=o.key===activeKey;
    return `<button type="button" data-${handlerName}="${o.key}" aria-pressed="${String(active)}" style="border:none;padding:6px 11px;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;background:${active?'#fff':'transparent'};color:${active?'var(--ink)':'var(--sub)'}">${esc(o.label)}</button>`;
  }).join('');
  document.getElementById('mode-toggles').innerHTML=`
    <div style="display:flex;gap:2px;background:oklch(94% 0.005 80);border-radius:9px;padding:2px">${toggleHTML(viewOpts,state.viewMode,'view')}</div>
    <div style="display:flex;gap:2px;background:oklch(94% 0.005 80);border-radius:9px;padding:2px">${toggleHTML(dispOpts,state.displayMode,'disp')}</div>`;
  document.querySelectorAll('[data-view]').forEach((b)=>b.addEventListener('click',()=>setViewMode(b.getAttribute('data-view'))));
  document.querySelectorAll('[data-disp]').forEach((b)=>b.addEventListener('click',()=>setDisplayMode(b.getAttribute('data-disp'))));
}

function renderNavRail(chapters){
  const show=state.viewMode==='timeline'&&state.showRail;
  if(!show){document.getElementById('nav-rail').innerHTML='';return;}
  const isEn=state.language==='en';
  document.getElementById('nav-rail').innerHTML=chapters.filter((c)=>c.hasVisible).map((c)=>{
    const active=c.idx===state.activeIdx;
    const short=isEn&&TR_CHAPTERS[c.num]?TR_CHAPTERS[c.num].short:RAW_CHAPTERS[c.idx].shortTitle;
    return `<button type="button" data-chapter="${c.idx}" style="text-align:left;display:flex;align-items:center;justify-content:flex-start;gap:6px;padding:4px 9px;border-radius:14px;cursor:pointer;border:1px solid ${active?c.accent:'var(--line)'};box-shadow:0 1px 4px rgba(0,0,0,.06);background:${active?c.accent:'#fff'};color:${active?'#fff':'var(--ink)'};font-size:10.5px;font-weight:700;white-space:nowrap;transition:all .2s ease">
      <span style="opacity:.7">${c.num}</span><span>${esc(short)}</span>
    </button>`;
  }).join('');
  document.getElementById('nav-rail').querySelectorAll('button').forEach((b)=>{
    b.addEventListener('click',()=>scrollToChapter(parseInt(b.getAttribute('data-chapter'),10)));
  });
}

function renderMain(){
  const isMobile=state.isMobile;
  const sidePad=isMobile?20:24;
  const cardW=isMobile?'100%':'235px';
  const cardMaxW=isMobile?'none':'235px';
  const gridCols=isMobile?'1fr':'repeat(auto-fill,minmax(210px,1fr))';
  const zigzagCols=isMobile?'0px 22px 1fr':'1fr 30px 1fr';
  const laneGap=isMobile?'22px':'30px';
  const chapterTopPad=isMobile?40:60;
  const chapterFontSize=isMobile?19:22;
  const yearFontSize=isMobile?13:16;

  const el=document.getElementById('main-content');
  el.style.setProperty('--card-w',cardW);
  el.style.setProperty('--card-maxw',cardMaxW);

  let html='';
  if(state.viewMode==='timeline'){
    const chapters=buildChapters();
    renderNavRail(chapters);
    html=chapters.filter((c)=>c.hasVisible).map((c)=>`
      <div style="max-width:900px;margin:0 auto;padding:${chapterTopPad}px ${sidePad}px ${chapterTopPad}px">
        <div data-chapter-idx="${c.idx}" style="display:flex;align-items:baseline;gap:12px;margin-bottom:2px">
          <div style="width:30px;height:30px;border-radius:9px;background:${c.accent};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0">${c.num}</div>
          <div style="font-size:${chapterFontSize}px;font-weight:800;color:var(--ink);letter-spacing:-0.01em">${esc(c.title)}</div>
          <div style="margin-left:auto;font-size:12.5px;color:var(--sub)">${esc(c.period)}</div>
        </div>
        <div style="font-size:13px;color:var(--sub);font-style:italic;margin:6px 0 6px 42px">${esc(c.theme)}</div>
        <div style="position:relative">
          <div style="position:absolute;left:50%;transform:translateX(-50%);top:0;bottom:0;width:4px;background:${c.lineColor};z-index:0"></div>
          ${c.groups.map((grp)=>`
            <div style="text-align:center;margin:${grp.marginTop}px 0 6px;position:relative;z-index:1">
              <span style="font-size:${yearFontSize}px;font-weight:800;color:var(--ink);letter-spacing:-0.02em;font-variant-numeric:tabular-nums;display:inline-block;padding:2px 14px;background:oklch(98% 0.005 80)">${esc(grp.label)}</span>
            </div>
            ${grp.isSpine?grp.rows.map((n)=>`
              <div style="display:grid;grid-template-columns:${zigzagCols};align-items:center;padding:6px 0;position:relative">
                <div style="display:flex;justify-content:flex-end">${n.showLeft?cardHTML(n,{tags:true}):''}</div>
                <div style="display:flex;justify-content:center;position:relative;z-index:2">
                  <div style="width:${n.dotSize}px;height:${n.dotSize}px;border-radius:50%;background:${n.dotColor};border:2px solid #fff;box-shadow:0 0 0 1.5px ${n.dotColor}"></div>
                </div>
                <div style="display:flex;justify-content:flex-start">${n.showRight?cardHTML(n,{tags:true}):''}</div>
              </div>`).join(''):''}
            ${grp.isOverlap?`
              <div style="padding:4px 0;margin:0 0 6px;position:relative">
                <div style="display:grid;grid-template-columns:1fr ${laneGap} 1fr">
                  ${grp.rows.map((row)=>`
                    <div style="grid-column:1;grid-row:${row.rowNum};display:flex;justify-content:flex-end;padding:3.5px 0">${row.l?laneCardHTML(row.l,grp.laneLColor,grp.laneLLabel):''}</div>
                    <div style="grid-column:2;grid-row:${row.rowNum};display:flex;align-items:center;justify-content:center">
                      <div style="width:${row.dotSize}px;height:${row.dotSize}px;border-radius:50%;background:${row.dotColor};border:2px solid #fff;box-shadow:0 0 0 1.5px ${row.dotColor};flex-shrink:0"></div>
                    </div>
                    <div style="grid-column:3;grid-row:${row.rowNum};display:flex;justify-content:flex-start;padding:3.5px 0">${row.r?laneCardHTML(row.r,grp.laneRColor,grp.laneRLabel):''}</div>
                  `).join('')}
                </div>
              </div>`:''}
          `).join('')}
        </div>
      </div>`).join('');
  } else {
    document.getElementById('nav-rail').innerHTML='';
    const q=state.searchQuery.trim().toLowerCase();
    const all=flatNodes();
    if(state.viewMode==='category'){
      const groups=CATEGORIES.filter((cat)=>state.activeCategory==='전체'||cat.name===state.activeCategory).map((cat)=>{
        const nodes=all.filter((n)=>(n.category===cat.name||n.altCategory===cat.name)&&nodeMatchesSearch(n,q)).map(decorate);
        return {name:tCat(cat.name),icon:cat.icon,count:state.language==='en'?nodes.length+' items':nodes.length+'건',nodes};
      }).filter((g)=>g.nodes.length>0);
      html=`<div style="max-width:900px;margin:0 auto;padding:28px ${sidePad}px 4px">${groups.map((grp)=>`
        <div style="margin-bottom:30px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:16px">${grp.icon}</span><span style="font-size:15px;font-weight:800;color:var(--ink)">${esc(grp.name)}</span><span style="font-size:11.5px;color:var(--sub)">${esc(grp.count)}</span></div>
          <div style="display:grid;grid-template-columns:${gridCols};gap:10px">${grp.nodes.map(gridCardHTML).join('')}</div>
        </div>`).join('')}</div>`;
    } else {
      const years=Array.from(new Set(all.map((n)=>n.year))).sort((a,b)=>b-a);
      const groups=years.map((y)=>{
        const nodes=all.filter((n)=>n.year===y&&nodeMatchesFilter(n,state.activeCategory)&&nodeMatchesSearch(n,q))
          .map((n)=>({...n,color:(CATEGORIES.find((c)=>c.name===n.category)||{}).color||GRAY})).map(decorate);
        return {year:y,nodes};
      }).filter((g)=>g.nodes.length>0);
      html=`<div style="max-width:900px;margin:0 auto;padding:28px ${sidePad}px 4px">${groups.map((grp)=>`
        <div style="margin-bottom:26px">
          <div style="font-size:17px;font-weight:800;color:var(--ink);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--line)">${grp.year}</div>
          <div style="display:grid;grid-template-columns:${gridCols};gap:10px">${grp.nodes.map(gridCardHTML).join('')}</div>
        </div>`).join('')}</div>`;
    }
  }
  el.innerHTML=html;
}

function renderAll(){
  renderHero();
  renderLangToggle();
  renderChipRow();
  renderModeToggles();
  renderMain();
  measureChipRow();
}

// ---------- interactions ----------
function firstVisibleChapterIdx(cat){
  for(let i=0;i<RAW_CHAPTERS.length;i++){
    const c=RAW_CHAPTERS[i];
    const has=c.blocks.some((b)=>{
      if(b.kind==='node') return nodeMatchesFilter(b.node,cat);
      const lMatch=b.laneL.some((n)=>nodeMatchesFilter({...n,category:b.laneLCategory},cat));
      const rMatch=b.laneR.some((n)=>nodeMatchesFilter({...n,category:b.laneRCategory},cat));
      return lMatch||rMatch;
    });
    if(has) return i;
  }
  return 0;
}
function setCategory(cat){state.activeCategory=cat;state.activeIdx=firstVisibleChapterIdx(cat);renderChipRow();renderMain();scrollToChapter(state.activeIdx);recompute();}
function setViewMode(mode){state.viewMode=mode;renderModeToggles();renderMain();}
function setDisplayMode(mode){state.displayMode=mode;renderModeToggles();renderMain();}
function setLanguage(lang){state.language=lang;renderAll();}

function scrollToChapter(idx){
  const marker=document.querySelector(`[data-chapter-idx="${idx}"]`);
  if(!marker) return;
  const target=marker.getBoundingClientRect().top+window.scrollY-175;
  animateScrollTo(target);
}
function animateScrollTo(target){
  const start=window.scrollY, distance=target-start, duration=550, startTime=performance.now();
  const ease=(t)=>1-Math.pow(1-t,3);
  const step=(now)=>{
    const t=Math.min(1,(now-startTime)/duration);
    window.scrollTo(0,start+distance*ease(t));
    if(t<1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function measureChipRow(){
  const el=document.getElementById('chip-row');
  if(!el.children.length) return;
  const first=el.children[0].getBoundingClientRect();
  const last=el.children[el.children.length-1].getBoundingClientRect();
  const w=Math.round(last.right-first.left);
  document.getElementById('search-input').style.width=w+'px';
}

function recompute(){
  const doc=document.documentElement;
  const max=doc.scrollHeight-window.innerHeight;
  const markers=document.querySelectorAll('[data-chapter-idx]');
  const pct=(max>0&&markers.length>1)?Math.min(1,window.scrollY/max):1;
  let idx=-1;
  markers.forEach((m)=>{if(m.getBoundingClientRect().top<180) idx=parseInt(m.getAttribute('data-chapter-idx'),10);});
  if(markers.length&&max>0&&window.scrollY>=max-4) idx=parseInt(markers[markers.length-1].getAttribute('data-chapter-idx'),10);

  const revealThreshold=window.innerHeight*0.95;
  let revealChanged=false;
  document.querySelectorAll('[data-reveal]').forEach((el)=>{
    const id=el.getAttribute('data-reveal');
    if(id&&!state.revealed.has(id)&&el.getBoundingClientRect().top<revealThreshold){state.revealed.add(id);revealChanged=true;}
  });

  const idxChanged=idx!==state.activeIdx;
  state.progress=pct; state.activeIdx=idx;

  document.getElementById('progress-fill').style.width=(Math.round(pct*100))+'%';
  if(idxChanged||revealChanged) renderMain();
}

// ---------- boot ----------
document.getElementById('lang-ko').addEventListener('click',()=>setLanguage('ko'));
document.getElementById('lang-en').addEventListener('click',()=>setLanguage('en'));
document.getElementById('search-input').addEventListener('input',(e)=>{state.searchQuery=e.target.value;renderMain();});

let ticking=false;
window.addEventListener('scroll',()=>{
  if(ticking) return;
  ticking=true;
  requestAnimationFrame(()=>{ticking=false;recompute();});
},{passive:true});

let resizeTimer=null;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    state.isMobile=window.innerWidth<720;
    state.showRail=window.innerWidth>=1060;
    renderAll();
    recompute();
  },120);
},{passive:true});

renderAll();
recompute();
</script>
</body>
</html>
